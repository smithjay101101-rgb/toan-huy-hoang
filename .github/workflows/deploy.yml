name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  # Airtable automation can hit the GitHub "dispatch" API to trigger a rebuild
  # when a listing is published (event_type: airtable-publish).
  repository_dispatch:
    types: [airtable-publish]
  # Automatic refresh: rebuild every 20 minutes so Airtable edits go live on
  # their own, no button pressing. GitHub Pages allows ~10 builds/hour, so 3 is
  # comfortably inside the limit.
  schedule:
    - cron: '*/20 * * * *'

# Don't pile up deploys; keep only the latest.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # contents:write lets the keep-alive step below push its empty commit.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # GitHub silently disables scheduled workflows after 60 days without
      # commits. When the last commit is older than 50 days, push an empty one
      # so the automatic rebuilds keep running unattended.
      - name: Keep scheduled rebuilds alive
        if: github.event_name == 'schedule'
        run: |
          last=$(git log -1 --format=%ct)
          age_days=$(( ( $(date +%s) - last ) / 86400 ))
          if [ "$age_days" -gt 50 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "Keep scheduled rebuilds active"
            git push
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (pulls Airtable data when secrets are set)
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: appZ9wP5ZlerVW3z8
          AIRTABLE_TABLE_LISTINGS: Listings
          SITE_URL: https://smithjay101101-rgb.github.io
        run: npm run build

      - name: Prepare static host files (root redirect + no Jekyll)
        run: |
          touch dist/.nojekyll
          node -e 'const fs=require("fs");const p="dist/index.html";let h=fs.readFileSync(p,"utf8");if(!h.includes("0; url=/en")){h=h.replace(/<head>/i,"<head>\n<meta http-equiv=\"refresh\" content=\"0; url=/en\">");fs.writeFileSync(p,h)}'

      - name: Publish to the live site repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: smithjay101101-rgb/smithjay101101-rgb.github.io
          publish_branch: main
          publish_dir: ./dist
          force_orphan: true
          commit_message: "Deploy from toan-huy-hoang@${{ github.sha }}"
