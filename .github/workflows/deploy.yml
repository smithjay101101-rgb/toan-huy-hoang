name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  repository_dispatch:
    types:
      # Always deploys (legacy instant hook; needs Airtable Business plan).
      - airtable-publish
      # Fingerprint-gated poll, fired by the Cloudflare Worker every 5 minutes
      # (their cron is punctual; GitHub throttles */5 schedules to ~hourly) and
      # by the "Update website" button in Airtable for on-demand publishes.
      - airtable-poll
  # Backup poll on GitHub's own cron, at off-peak minutes which get much
  # better treatment than */5. The Cloudflare Worker is the primary driver.
  schedule:
    - cron: '6,21,36,51 * * * *'

# Don't pile up deploys. Real deploy events (push, manual, instant hook) may
# cancel an in-flight run; fingerprint-gated polls must never cancel one (a
# poll skips when content is unchanged, so letting it cancel a code deploy
# would strand that code until the next content edit).
concurrency:
  group: deploy
  cancel-in-progress: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.action == 'airtable-publish' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    # contents:write lets the keep-alive step below push its empty commit.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # GitHub silently disables scheduled workflows after 60 days without
      # commits. When the last commit is older than 50 days, push an empty one
      # so the automatic rebuilds keep running unattended.
      - name: Keep scheduled rebuilds alive
        if: github.event_name == 'schedule'
        run: |
          last=$(git log -1 --format=%ct)
          age_days=$(( ( $(date +%s) - last ) / 86400 ))
          if [ "$age_days" -gt 50 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "Keep scheduled rebuilds active"
            git push
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch Airtable content
        id: data
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: appZ9wP5ZlerVW3z8
          AIRTABLE_TABLE_LISTINGS: Listings
          AIRTABLE_TABLE_PROJECTS: Projects
        run: |
          npm run fetch:data
          npm run fetch:guides
          # Fingerprint the content: listing/guide data plus the downloaded
          # photo bytes, so a swapped photo (same filename) still counts as a change.
          HASH=$( { cat src/data/listings.json src/data/guides.json 2>/dev/null; \
                    find public/listings public/guides -type f 2>/dev/null | sort | xargs -r sha256sum; } \
                  | sha256sum | cut -d' ' -f1 )
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      # Scheduled polls only: compare against the fingerprint of the content we
      # LAST PUSHED (read from the live repo, not the served site). Serving can
      # lag behind pushes when the Pages publisher has a bad day; comparing
      # against the push target means we never re-push identical content in a
      # loop, which is what triggers Pages rate limiting and failure email spam.
      - name: Check whether content changed
        id: fresh
        if: (github.event_name == 'schedule' || github.event.action == 'airtable-poll')
        run: |
          OLD=$(curl -sf https://raw.githubusercontent.com/smithjay101101-rgb/smithjay101101-rgb.github.io/main/data-hash.txt || echo unreachable)
          if [ "$OLD" = "unreachable" ]; then
            echo "changed=no" >> "$GITHUB_OUTPUT"
            echo "Previous fingerprint unreachable; skipping this poll rather than risking a deploy storm."
          elif [ "${{ steps.data.outputs.hash }}" = "$OLD" ]; then
            echo "changed=no" >> "$GITHUB_OUTPUT"
            echo "Content unchanged, skipping deploy."
          else
            echo "changed=yes" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: ${{ !((github.event_name == 'schedule' || github.event.action == 'airtable-poll') && steps.fresh.outputs.changed == 'no') }}
        env:
          SITE_URL: https://toanrealestate.com
        run: |
          node scripts/gen-sitemap.mjs
          npx vite-react-ssg build
          node scripts/fix-ssg-hash.mjs
          node scripts/gen-redirects.mjs

      - name: Prepare static host files
        if: ${{ !((github.event_name == 'schedule' || github.event.action == 'airtable-poll') && steps.fresh.outputs.changed == 'no') }}
        run: |
          touch dist/.nojekyll
          echo "${{ steps.data.outputs.hash }}" > dist/data-hash.txt
          node -e 'const fs=require("fs");const p="dist/index.html";let h=fs.readFileSync(p,"utf8");if(!h.includes("0; url=/en")){h=h.replace(/<head>/i,"<head>\n<meta http-equiv=\"refresh\" content=\"0; url=/en\">");fs.writeFileSync(p,h)}'

      - name: Publish to the live site repo
        if: ${{ !((github.event_name == 'schedule' || github.event.action == 'airtable-poll') && steps.fresh.outputs.changed == 'no') }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: smithjay101101-rgb/smithjay101101-rgb.github.io
          publish_branch: main
          publish_dir: ./dist
          force_orphan: true
          # Writes the CNAME file on every publish so the custom domain sticks
          # (force_orphan replaces the whole tree, which would otherwise wipe it).
          cname: toanrealestate.com
          commit_message: "Deploy from toan-huy-hoang@${{ github.sha }}"

      # GitHub Pages' branch publisher flakes with "Deployment failed, try
      # again later". A re-requested build has always cured it, so cure it
      # automatically: watch the publish land and nudge it when it errors.
      # Bounded (6 checks, 75s apart) and never fails this workflow.
      - name: Make sure Pages actually published
        if: ${{ !((github.event_name == 'schedule' || github.event.action == 'airtable-poll') && steps.fresh.outputs.changed == 'no') }}
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          R=smithjay101101-rgb/smithjay101101-rgb.github.io
          for i in 1 2 3 4 5 6; do
            sleep 75
            RESP=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/$R/pages/builds/latest" || true)
            ST=$(echo "$RESP" | grep -o '"status": *"[a-z]*"' | head -1 | grep -o '[a-z]*"$' | tr -d '"')
            CREATED=$(echo "$RESP" | grep -o '"created_at": *"[^"]*"' | head -1 | cut -d'"' -f4)
            AGE=$(( ( $(date +%s) - $(date -d "$CREATED" +%s 2>/dev/null || date +%s) ) / 60 ))
            echo "[$i] pages build: ${ST:-unknown} (${AGE} min old)"
            [ "$ST" = "built" ] && exit 0
            # errored, or a zombie stuck in "building" for over 8 minutes: kick it
            if [ "$ST" = "errored" ] || { [ "$ST" = "building" ] && [ "$AGE" -gt 8 ]; }; then
              echo "publisher stuck ($ST), requesting a fresh build"
              curl -sf -X POST -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/$R/pages/builds" >/dev/null || true
              sleep 20
            fi
          done
          echo "Publisher still settling; the health nudges on later polls will finish the job."
          exit 0

      # Self-healing tick: quiet scheduled polls still give a single nudge if
      # the publisher is stuck in errored, so it recovers within minutes even
      # when no content is changing.
      - name: Nudge a stuck publisher
        if: ${{ (github.event_name == 'schedule' || github.event.action == 'airtable-poll') && steps.fresh.outputs.changed == 'no' }}
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          R=smithjay101101-rgb/smithjay101101-rgb.github.io
          RESP=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/$R/pages/builds/latest" || true)
          ST=$(echo "$RESP" | grep -o '"status": *"[a-z]*"' | head -1 | grep -o '[a-z]*"$' | tr -d '"')
          CREATED=$(echo "$RESP" | grep -o '"created_at": *"[^"]*"' | head -1 | cut -d'"' -f4)
          AGE=$(( ( $(date +%s) - $(date -d "$CREATED" +%s 2>/dev/null || date +%s) ) / 60 ))
          echo "pages build: ${ST:-unknown} (${AGE} min old)"
          if [ "$ST" = "errored" ] || { [ "$ST" = "building" ] && [ "$AGE" -gt 8 ]; }; then
            echo "publisher stuck ($ST), requesting a fresh build"
            curl -sf -X POST -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/$R/pages/builds" >/dev/null || true
          fi
